name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/**"
      - "deploy/huggingface/**"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub client
        run: pip install "huggingface_hub>=0.23"

      - name: Prepare Space bundle
        run: |
          mkdir -p hf-space
          cp -r backend  hf-space/backend
          cp -r data     hf-space/data
          cp deploy/huggingface/Dockerfile  hf-space/Dockerfile
          cp deploy/huggingface/README.md   hf-space/README.md

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, upload_folder

          token = os.environ["HF_TOKEN"].strip()
          if not token:
              raise SystemExit("HF_TOKEN secret is empty. "
                               "Add it in GitHub Settings > Secrets and variables > Actions.")

          repo_id = "min-bok/manufacturing-insight-ai"

          api = HfApi(token=token)
          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )
          upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path="hf-space",
              path_in_repo=".",
              token=token,
              commit_message="chore: deploy Manufacturing Insight AI",
              ignore_patterns=["**/__pycache__/**", "**/*.pyc", "**/*.db"],
          )
          print(f"Deployed → https://huggingface.co/spaces/{repo_id}")
          PY
